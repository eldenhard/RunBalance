<!DOCTYPE html>
<html {{ HTML_ATTRS }}>
  <head>{{ HEAD }}</head>
  <body {{ BODY_ATTRS }}>
    <div id="rb-splash" aria-hidden="true">
      <div class="rb-splash__ring"></div>
      <p class="rb-splash__title">RunBalance</p>
      <p class="rb-splash__subtitle">собираем твой день…</p>
    </div>
    {{ APP }}
    <style>
      #rb-splash {
        position: fixed;
        inset: 0;
        z-index: 99999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 12px;
        background: #0b0b0c;
        color: #fff;
        font-family: "Helvetica Neue", Arial, sans-serif;
        transition: opacity 0.35s ease, visibility 0.35s ease;
      }
      #rb-splash.rb-splash--hide {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }
      .rb-splash__ring {
        width: 72px;
        height: 72px;
        border-radius: 9999px;
        border: 2px solid rgba(255, 255, 255, 0.18);
        border-top-color: #fff;
        animation: rb-spin 1.1s linear infinite;
      }
      .rb-splash__title {
        margin: 8px 0 0;
        font-size: 17px;
        font-weight: 500;
        letter-spacing: -0.02em;
      }
      .rb-splash__subtitle {
        margin: 0;
        font-size: 12px;
        color: rgba(255, 255, 255, 0.55);
      }
      @keyframes rb-spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </body>
</html>
